document.getElementById('btn-slide').addEventListener('click', () => {
  const uc = USE_CASES.find(u => u.id === state.activeId);
  const r  = state.lastResult;
  if (!r) { alert('Open a use case calculator first.'); return; }
  const btn = document.getElementById('btn-slide');
  btn.textContent = '⏳ Building...';
  btn.disabled = true;
  setTimeout(() => {
    try { buildSlide(uc, r); }
    catch(e) { console.error(e); alert('Slide error: ' + e.message); }
    finally { btn.textContent = '⬛ Generate Slide'; btn.disabled = false; }
  }, 60);
});

function buildSlide(uc, r) {
  if (typeof PptxGenJS === 'undefined') {
    alert('PptxGenJS not loaded — please refresh the page.'); return;
  }

  // ── Design tokens (Appraisal_Output_Template) ────────────────────────
  const C = {
    white:   'FFFFFF',
    dark:    '333333',   // primary text — matches template dark gray
    medium:  '595959',   // body / summary text
    muted:   '9E9E9E',   // label text under metrics / footer
    tblLine: 'E0E0E4',   // subtle row divider lines
    tblHdr:  '212121',   // table header bold text
    cardBg:  'FFFFFF',   // white card on slide 2
    cardBdr: 'E0E0E4',   // card border
    // Gradient blob colors for slide 2 background band
    blobA:   'A78BFA',   // purple
    blobB:   '60A5FA',   // blue
    blobC:   'F472B6',   // pink
    barFill: '4D6EE5',   // driver bar fill (blue, matches template)
    barBg:   'EEEEEE',   // driver bar track
  };

  const FF = 'Inter';    // template font throughout

  // ── Value helpers ────────────────────────────────────────────────────
  const gross3 = r.years.reduce((s,y)=>s+y.gross,0);
  const fee3   = r.years.reduce((s,y)=>s+y.fee,0);
  const net3   = r.years.reduce((s,y)=>s+y.net,0);
  const roi3   = gross3 / (fee3||1);
  const y1     = r.years[0];
  const pay1   = y1.fee / (y1.gross/12||1);

  const fmtM = n => {
    if (!n || isNaN(n)) return '—';
    const a = Math.abs(n);
    if (a >= 1e9) return (n<0?'-':'') + '$' + (Math.abs(n)/1e9).toFixed(1) + 'B';
    if (a >= 1e6) return (n<0?'-':'') + '$' + (Math.abs(n)/1e6).toFixed(1) + 'M';
    return (n<0?'-':'') + '$' + (Math.abs(n)/1e3).toFixed(0) + 'K';
  };
  const fmtROI = n => (!n||isNaN(n)||!isFinite(n)) ? '—' : n.toFixed(1) + 'x';
  const fmtPct = n => (!n||isNaN(n)) ? '—' : (n*100).toFixed(1) + '%';

  // Sector label
  let sectorLabel = '';
  Object.entries(TAXONOMY).forEach(([,s]) => {
    const flat = s.subFilter ? Object.values(s.entries).flat() : (s.entries||[]);
    if (flat.some(e=>e.modelId===uc.id)) sectorLabel = s.label;
  });

  // Drivers sorted by 3-yr total desc
  const drivers = r.drivers.map(d => ({
    name:  d.name,
    total: r.years.reduce((s,y)=>s+(y[d.key]||0),0),
    y1:    y1[d.key]||0,
  })).sort((a,b)=>b.total-a.total);

  // All assumptions (every input, not just key ones)
  const allAssumps = [];
  uc.sections.forEach(sec => {
    if (sec.title.toLowerCase().includes('cohere north')) return; // skip platform fees section
    sec.inputs.forEach(inp => {
      const v = state.values[uc.id][inp.id];
      const disp = inp.pct ? fmtPct(v)
        : inp.unit === '$' ? fmtM(v)
        : Number(v).toLocaleString('en-US',{maximumFractionDigits:0}) + ' ' + inp.unit;
      allAssumps.push({ label: inp.label, value: disp });
    });
  });

  // ── Build presentation ──────────────────────────────────────────────
  const pres = new PptxGenJS();
  pres.layout  = 'LAYOUT_WIDE'; // 13.33 × 7.5
  pres.subject = uc.name + ' — Cohere Value Appraisal';
  pres.author  = 'Cohere North';

  // Footer helper
  function addFooter(sl, pageNum) {
    // Cohere logo bottom-left
    if (LOGO_B64) {
      try {
        sl.addImage({ data:'image/png;base64,'+LOGO_B64, x:0.28, y:7.18, w:0.45, h:0.2 });
      } catch(e) { /* skip if logo fails */ }
    }
    sl.addText('COHERE VALUE APPRAISAL', {
      x: 4.0, y: 7.22, w: 5.0, h: 0.18,
      fontFace: FF, fontSize: 8, color: C.muted,
      align: 'center', charSpacing: 2,
    });
    sl.addText(String(pageNum), {
      x: 12.9, y: 7.22, w: 0.3, h: 0.18,
      fontFace: FF, fontSize: 8, color: C.muted, align: 'right',
    });
  }

  // ════════════════════════════════════════════════════════════════════
  // SLIDE 1 — EXECUTIVE SUMMARY
  // Layout: white bg · title top-left · 2×2 metric grid center-right
  //         · exec summary text left column · footer
  // ════════════════════════════════════════════════════════════════════
  const s1 = pres.addSlide();
  s1.background = { color: C.white };

  // Use case title — top left, light weight, dark
  s1.addText(uc.name + (sectorLabel ? '  ·  ' + sectorLabel : ''), {
    x:0.35, y:0.3, w:4.5, h:0.42,
    fontFace: FF, fontSize: 20, bold: false, color: C.dark,
  });

  // EXECUTIVE SUMMARY label
  s1.addText('EXECUTIVE SUMMARY', {
    x:0.35, y:1.05, w:3.0, h:0.22,
    fontFace: FF, fontSize: 9.5, bold: false,
    color: C.muted, charSpacing: 2.5,
  });

  // Summary paragraph
  const summaryText = [
    'Year 1 platform cost of ' + fmtM(y1.fee) + ' recovered in ' +
      (pay1>0&&isFinite(pay1) ? pay1.toFixed(1)+' months' : '—') + '.',
    'Three-year gross value of ' + fmtM(gross3) + ' across ' + drivers.length + ' value drivers. ' +
      'Net of Cohere fees: ' + fmtM(net3) + '.',
    'Largest driver: ' + (drivers[0]?.name||'—') + ' (' + fmtM(drivers[0]?.total||0) + ', ' +
      fmtPct(gross3>0?(drivers[0]?.total||0)/gross3:0) + ' of total).',
  ].join('\n\n');

  s1.addText(summaryText, {
    x:0.35, y:1.35, w:3.2, h:2.2,
    fontFace: FF, fontSize: 11.5, color: C.medium,
    valign: 'top', paraSpaceAfter: 8,
  });

  // ── 2×2 metric grid (center-right) ────────────────────────────────
  // Template positions (from PDF analysis):
  // Row 1 number: y ≈ 1.00", labels y ≈ 1.70"
  // Row 2 number: y ≈ 3.30", labels y ≈ 4.05"
  // Col 1 x ≈ 3.8", Col 2 x ≈ 8.3"

  const METRIC_FONT_SIZE = 54;
  const LABEL_FONT_SIZE  = 11;

  const mCol1X = 3.80, mCol2X = 8.30;

  // Row 1: YR 1 NET VALUE | YEAR 1 ROI
  s1.addText(fmtM(y1.net), {
    x:mCol1X, y:0.95, w:4.0, h:0.82,
    fontFace:FF, fontSize:METRIC_FONT_SIZE, bold:false, color:C.dark,
  });
  s1.addText('YR 1 NET VALUE', {
    x:mCol1X, y:1.78, w:4.0, h:0.28,
    fontFace:FF, fontSize:LABEL_FONT_SIZE, bold:false,
    color:C.muted, charSpacing:1.5,
  });

  s1.addText(fmtROI(y1.roi), {
    x:mCol2X, y:0.95, w:4.5, h:0.82,
    fontFace:FF, fontSize:METRIC_FONT_SIZE, bold:false, color:C.dark,
  });
  s1.addText('YEAR 1 ROI', {
    x:mCol2X, y:1.78, w:4.5, h:0.28,
    fontFace:FF, fontSize:LABEL_FONT_SIZE, bold:false,
    color:C.muted, charSpacing:1.5,
  });

  // Row 2: 3-YR NET VALUE | 3-YR RETURN
  s1.addText(fmtM(net3), {
    x:mCol1X, y:3.20, w:4.0, h:0.82,
    fontFace:FF, fontSize:METRIC_FONT_SIZE, bold:false, color:C.dark,
  });
  s1.addText('3-YR NET VALUE', {
    x:mCol1X, y:4.02, w:4.0, h:0.28,
    fontFace:FF, fontSize:LABEL_FONT_SIZE, bold:false,
    color:C.muted, charSpacing:1.5,
  });

  s1.addText(fmtROI(roi3), {
    x:mCol2X, y:3.20, w:4.5, h:0.82,
    fontFace:FF, fontSize:METRIC_FONT_SIZE, bold:false, color:C.dark,
  });
  s1.addText('3-YR RETURN', {
    x:mCol2X, y:4.02, w:4.5, h:0.28,
    fontFace:FF, fontSize:LABEL_FONT_SIZE, bold:false,
    color:C.muted, charSpacing:1.5,
  });

  // BOE/d note if applicable
  if (y1.boedRecovered !== undefined) {
    s1.addText('BOE/d recovered (Y1): ' + Number(y1.boedRecovered||0).toLocaleString(), {
      x:mCol1X, y:4.45, w:8.5, h:0.25,
      fontFace:FF, fontSize:11, color:C.muted,
    });
  }

  addFooter(s1, 1);

  // ════════════════════════════════════════════════════════════════════
  // SLIDE 2 — SCENARIO ASSUMPTIONS + VALUE DRIVER CHART
  // Layout: white bg · gradient blob band bottom · white rounded card
  //         containing the full assumptions table · driver chart right
  // ════════════════════════════════════════════════════════════════════
  const s2 = pres.addSlide();
  s2.background = { color: C.white };

  // Gradient band at bottom (abstract blobs — approximate with solid fill)
  s2.addShape(pres.shapes.RECTANGLE, {
    x:0, y:5.6, w:13.33, h:1.9,
    fill:{ color: '7C3AED' }, // deep purple
    line:{ type:'none' },
  });
  // Second blob overlay (blue, offset)
  s2.addShape(pres.shapes.OVAL, {
    x:-0.5, y:5.2, w:5.0, h:2.5,
    fill:{ color: '4F46E5' },
    line:{ type:'none' },
  });
  // Third blob (pink/coral)
  s2.addShape(pres.shapes.OVAL, {
    x:7.5, y:5.4, w:6.0, h:2.5,
    fill:{ color: 'EC4899' },
    line:{ type:'none' },
  });

  // ── Title ──────────────────────────────────────────────────────────
  s2.addText('Scenario Assumptions', {
    x:0.35, y:0.22, w:8.0, h:0.38,
    fontFace: FF, fontSize: 22, bold: false, color: C.dark,
  });

  // ── White rounded card for table ───────────────────────────────────
  const CARD_X = 0.30, CARD_Y = 0.80;
  const CARD_W = 9.20, CARD_H = 4.90;

  s2.addShape(pres.shapes.ROUNDED_RECTANGLE, {
    x:CARD_X, y:CARD_Y, w:CARD_W, h:CARD_H,
    fill:{ color: C.cardBg },
    line:{ color: C.cardBdr, width: 0.5 },
    rectRadius: 0.12,
  });

  // ── Assumptions table inside card ──────────────────────────────────
  const COL_W = (CARD_W - 0.24) / 4;  // 4 equal columns inside card padding
  const TABLE_X = CARD_X + 0.12;
  const TABLE_Y = CARD_Y + 0.12;
  const TABLE_W = CARD_W - 0.24;

  // Split assumptions into left+right pairs
  const half = Math.ceil(allAssumps.length / 2);
  const left  = allAssumps.slice(0, half);
  const right = allAssumps.slice(half);
  const maxRows = Math.max(left.length, right.length);

  const tableData = [
    // Header row
    [
      { text:'Driver',       options:{ bold:true, fontSize:12, fontFace:FF, color:C.tblHdr, fill:C.white, margin:[4,8,4,8] } },
      { text:'Est. Value',   options:{ bold:true, fontSize:12, fontFace:FF, color:C.tblHdr, fill:C.white, margin:[4,8,4,8] } },
      { text:'Driver',       options:{ bold:true, fontSize:12, fontFace:FF, color:C.tblHdr, fill:C.white, margin:[4,8,4,8] } },
      { text:'Column Label', options:{ bold:true, fontSize:12, fontFace:FF, color:C.tblHdr, fill:C.white, margin:[4,8,4,8] } },
    ],
    // Data rows
    ...Array.from({length: maxRows}, (_, i) => {
      const l = left[i]  || {label:'', value:''};
      const rr = right[i] || {label:'', value:''};
      return [
        { text: l.label,   options:{ fontSize:10, fontFace:FF, color:C.dark,   fill:C.white, margin:[3,8,3,8] } },
        { text: l.value,   options:{ fontSize:10, fontFace:FF, color:C.medium, fill:C.white, margin:[3,8,3,8] } },
        { text: rr.label,  options:{ fontSize:10, fontFace:FF, color:C.dark,   fill:C.white, margin:[3,8,3,8] } },
        { text: rr.value,  options:{ fontSize:10, fontFace:FF, color:C.medium, fill:C.white, margin:[3,8,3,8] } },
      ];
    }),
  ];

  s2.addTable(tableData, {
    x: TABLE_X, y: TABLE_Y, w: TABLE_W,
    colW: [COL_W, COL_W, COL_W, COL_W],
    border: { type:'solid', pt:0.4, color:C.tblLine },
    rowH: 0.30,
    autoPage: false,
  });

  // ── Value driver chart (right of card) ─────────────────────────────
  const CHART_X = 9.75, CHART_W = 3.28;
  const CHART_TITLE_Y = 0.80;

  s2.addText('Value Drivers · 3-Year', {
    x:CHART_X, y:CHART_TITLE_Y, w:CHART_W, h:0.24,
    fontFace:FF, fontSize:10, color:C.muted, charSpacing:1.5,
  });

  // Total for % calc
  const maxDrvTotal = Math.max(...drivers.map(d=>d.total), 1);

  drivers.slice(0,7).forEach((d, di) => {
    const rowY    = 1.15 + di * 0.55;
    const pct     = gross3 > 0 ? d.total / gross3 : 0;
    const barFrac = d.total / maxDrvTotal;
    const barW    = Math.max(CHART_W * barFrac, 0.06);

    // Driver name
    s2.addText(d.name, {
      x:CHART_X, y:rowY, w:CHART_W, h:0.18,
      fontFace:FF, fontSize:9.5, color:C.dark,
    });
    // $ and %
    s2.addText(fmtM(d.total) + '  ' + fmtPct(pct), {
      x:CHART_X, y:rowY, w:CHART_W, h:0.18,
      fontFace:FF, fontSize:9, color:C.muted, align:'right',
    });
    // Bar track
    s2.addShape(pres.shapes.RECTANGLE, {
      x:CHART_X, y:rowY+0.20, w:CHART_W, h:0.10,
      fill:{ color: C.barBg }, line:{ type:'none' },
    });
    // Bar fill
    s2.addShape(pres.shapes.RECTANGLE, {
      x:CHART_X, y:rowY+0.20, w:barW, h:0.10,
      fill:{ color: C.barFill }, line:{ type:'none' },
    });
  });

  // 3-yr summary below chart
  const summY = 1.15 + Math.min(drivers.length,7)*0.55 + 0.15;
  s2.addText('3-yr gross: ' + fmtM(gross3) + '  ·  net: ' + fmtM(net3) + '  ·  ROI: ' + fmtROI(roi3), {
    x:CHART_X, y:summY, w:CHART_W, h:0.25,
    fontFace:FF, fontSize:9, color:C.muted,
  });

  addFooter(s2, 2);

  // ── Save ────────────────────────────────────────────────────────────
  const fname = 'Cohere_Appraisal_' + uc.id + '_' + new Date().toISOString().slice(0,10) + '.pptx';
  pres.writeFile({ fileName: fname });
}





</script>
